asset: BTC
polygon_ticker: X:BTCUSD
debug: true

forecast:
  horizon_seconds: 86400
  interval_seconds: 300
  num_paths: 1000
  random_seed: 42

history:
  lookback_days: 14
  bar_multiplier: 5
  bar_timespan: minute
  adjusted: true
  repair_missing_bars: true

features:
  short_window_bars: 12
  long_window_bars: 48
  kurtosis_window_bars: 48
  vol_slope_window_bars: 48

sessions:
  timezone: UTC
  eu:
    start: "07:00"
    end: "13:30"
  eu_us_overlap:
    start: "13:30"
    end: "16:00"
  us:
    start: "16:00"
    end: "21:00"
  outside_market_hours:
    start: "21:00"
    end: "07:00"

sampling:
  block_minutes: 60
  nearest_neighbours: 30
  bootstrap_with_replacement: true

normalization:
  volatility_scale_min: 0.40
  volatility_scale_max: 2.50
  momentum_adjustment_max_bps: 50
  kurtosis_scale_min: 0.70
  kurtosis_scale_max: 1.80

storage:
  raw_dir: data/raw
  processed_dir: data/processed
  forecast_dir: data/forecasts
  raw_format: csv
  processed_format: csv
