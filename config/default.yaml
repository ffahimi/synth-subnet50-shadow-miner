asset: BTC
polygon_ticker: X:BTCUSD
debug: true

assets:
  BTC:
    polygon_ticker: X:BTCUSD
    synth_asset: BTC
    competition: crypto-24h
  ETH:
    polygon_ticker: X:ETHUSD
    synth_asset: ETH
    competition: crypto-24h
  XAU:
    polygon_ticker: C:XAUUSD
    synth_asset: XAU
    competition: com-equ-24h

forecast:
  horizon_seconds: 86400
  interval_seconds: 300
  num_paths: 1000
  random_seed: 42
  points_per_path: 289

model:
  entrypoint: synth_shadow.models.baseline:SessionPathBaselineModel
  endpoint:
  timeout_seconds: 120

synth:
  base_url: https://api.synthdata.co
  asset: BTC
  time_increment: 300
  time_length: 86400
  prompt_lookback_days: 3
  prompt_forward_hours: 3
  score_lookback_days: 3
  competition: crypto-24h
  fetch_rewards_in_cycle: false

scoring:
  maturity_grace_seconds: 300
  max_matured_score_attempts_per_cycle: 3

backtest:
  days: 1
  stride_minutes: 5
  max_origins:
  num_paths: 250
  compare_miners: 4

history:
  lookback_days: 14
  bar_multiplier: 5
  bar_timespan: minute
  adjusted: true
  repair_missing_bars: true

features:
  short_window_bars: 12
  long_window_bars: 48
  kurtosis_window_bars: 48
  vol_slope_window_bars: 48

sessions:
  timezone: UTC
  eu:
    start: "07:00"
    end: "13:30"
  eu_us_overlap:
    start: "13:30"
    end: "16:00"
  us:
    start: "16:00"
    end: "21:00"
  outside_market_hours:
    start: "21:00"
    end: "07:00"

sampling:
  block_minutes: 60
  nearest_neighbours: 30
  bootstrap_with_replacement: true

normalization:
  volatility_scale_min: 0.40
  volatility_scale_max: 2.50
  momentum_adjustment_max_bps: 50
  kurtosis_scale_min: 0.70
  kurtosis_scale_max: 1.80

storage:
  raw_dir: data/raw
  processed_dir: data/processed
  forecast_dir: data/forecasts
  realized_dir: data/realized
  reports_dir: data/reports
  backtest_dir: data/backtests
  registry_path: data/registry.sqlite3
  raw_format: csv
  processed_format: csv

inspection:
  sample_paths: 3
  sample_points: 12
  checkpoints:
    t0: 0
    1h: 12
    4h: 48
    12h: 144
    24h: 288
