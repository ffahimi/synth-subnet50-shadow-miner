asset: BTC
polygon_ticker: X:BTCUSD

forecast:
  horizon_seconds: 86400
  interval_seconds: 300
  num_paths: 1000
  random_seed: 42

history:
  lookback_days: 14
  bar_multiplier: 5
  bar_timespan: minute

features:
  short_window_bars: 12
  long_window_bars: 48
  kurtosis_window_bars: 48
  vol_slope_window_bars: 48

sessions:
  timezone: UTC
  eu:
    start: "07:00"
    end: "13:30"
  eu_us_overlap:
    start: "13:30"
    end: "16:00"
  us:
    start: "16:00"
    end: "21:00"
  outside_market_hours:
    start: "21:00"
    end: "07:00"
